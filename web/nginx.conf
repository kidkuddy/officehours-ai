server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Go backend.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large uploads (Data Room).
        client_max_body_size 50m;
    }

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for client-side routes.
    # Never cache HTML, so a new build is picked up on the next normal load
    # (otherwise browsers keep the old index.html pointing at stale bundles).
    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
